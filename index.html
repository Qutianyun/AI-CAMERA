function extractFeatureFromCanvas(src){const ctx=src.getContext('2d',{willReadFrequently:true}),w=src.width,h=src.height;const bbox=findDarkBBox(ctx.getImageData(0,0,w,h),w,h);const fc=$('featureCanvas'),fw=32,fh=48;fc.width=fw;fc.height=fh;const fctx=fc.getContext('2d',{willReadFrequently:true});fctx.fillStyle='#fff';fctx.fillRect(0,0,fw,fh);fctx.drawImage(src,bbox[0],bbox[1],bbox[2]-bbox[0],bbox[3]-bbox[1],0,0,fw,fh);const data=fctx.getImageData(0,0,fw,fh).data;let gray=[],vec=[];for(let i=0;i<data.length;i+=4){let g=(.299*data[i]+.587*data[i+1]+.114*data[i+2])/255;gray.push(g);vec.push(Math.round((1-g)*255*.72))}for(let by=0;by<12;by++){for(let bx=0;bx<8;bx++){let sum=0;for(let yy=0;yy<4;yy++)for(let xx=0;xx<4;xx++){const idx=(by*4+yy)*32+(bx*4+xx);if(gray[idx]>.62)sum++}vec.push(Math.round((sum/16)*255*.28))}}return vec}
function dist(a,b){let s=0,n=Math.min(a.length,b.length);for(let i=0;i<n;i++){let d=a[i]-b[i];s+=d*d}return Math.sqrt(s/n)/255}
function classify(vec){let list=[];Object.keys(TEMPLATES).forEach(k=>list.push({lang:k,score:1-dist(vec,TEMPLATES[k])}));loadMemory().forEach(m=>{if(m.vec&&m.lang)list.push({lang:m.lang,score:1-dist(vec,m.vec),mem:true})});list.sort((a,b)=>b.score-a.score);const best=list[0]||{lang:'unknown',score:0},second=list[1]||{score:0};let margin=best.score-second.score;let risk=Math.round(Math.max(0,Math.min(99,(1-best.score)*160 + Math.max(0,.08-margin)*360)));if(best.score<.45){best.lang='unknown';risk=Math.max(risk,88)}if(mode!=='random'&&best.lang!==mode)risk=Math.max(risk,92);if(best.mem&&best.score>.95)risk=0;return {lang:best.lang,score:best.score,margin,risk,mem:!!best.mem}}
function render(res,elapsed){let judge='AUTO',cls='auto';if(mode!=='random'){if(res.lang===mode&&res.risk<80){judge='OK';cls='ok'}else{judge='NG';cls='ng'}}$('judge').textContent=judge;$('judge').className='resValue '+cls;$('lang').textContent=langMap[res.lang]||'未知';$('lang').className='resValue '+(res.lang==='unknown'?'auto':'ok');$('risk').textContent=res.risk+'%';$('risk').className='resValue '+(res.risk<30?'riskLow':res.risk<70?'riskMid':'riskHigh');$('recTime').textContent=(elapsed/1000).toFixed(2)+'s';if(mode!=='random'&&judge==='OK'&&res.lang!=='unknown'&&res.risk<35)addMemory(res.lang,lastVec)}
let lastVec=null;async function captureAndRecognize(){if(!stream||recognizing)return;const t0=performance.now();setBusy(true);$('flash').classList.add('on');setTimeout(()=>$('flash').classList.remove('on'),190);try{const canvas=captureCanvas();lastVec=extractFeatureFromCanvas(canvas);const result=classify(lastVec);const elapsed=performance.now()-t0;render(result,elapsed); // automatically return live camera after result
$('video').classList.remove('hidden');}catch(e){$('judge').textContent='NG';$('judge').className='resValue ng';$('lang').textContent='未知';$('risk').textContent='99%';$('risk').className='resValue riskHigh';$('recTime').textContent=((performance.now()-t0)/1000).toFixed(2)+'s'}finally{setBusy(false)}}
if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}))}window.addEventListener('pagehide',()=>stopCamera(false));
</script>
