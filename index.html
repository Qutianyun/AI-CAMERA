<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>AI CAMERA LITE V2</title><style>
*{box-sizing:border-box}html,body{margin:0;height:100%;background:#06111f;color:#e8f1ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;overflow:hidden}.app{height:100vh;display:grid;grid-template-rows:auto 1fr auto;gap:7px;padding:7px;background:linear-gradient(180deg,#0f172a,#06111f 55%,#020617)}.top{display:grid;grid-template-columns:1fr auto;gap:7px;align-items:center;background:#101827;border:1px solid #2b3b55;border-radius:15px;padding:9px}.title{font-size:15px;font-weight:950}.sub{font-size:11px;color:#94a3b8;margin-top:2px}.btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.btn{border:1px solid #475569;background:#1e293b;color:#e5eefc;border-radius:999px;padding:8px 10px;font-size:12px;font-weight:850}.primary{background:#2563eb}.good{background:#15803d}.bad{background:#991b1b}.stage{position:relative;min-height:0;border:1px solid #2b3b55;border-radius:18px;overflow:hidden;background:#020617;display:flex;align-items:center;justify-content:center}.stage video,.stage canvas{max-width:100%;max-height:100%;display:block}.roi{position:absolute;border:4px solid #ef4444;border-radius:18px;box-shadow:0 0 0 9999px rgba(0,0,0,.18);pointer-events:none}.roiText{position:absolute;background:rgba(239,68,68,.92);font-size:12px;font-weight:950;color:#fff;padding:4px 8px;border-radius:999px}.bottom{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}.card{background:#101827;border:1px solid #2b3b55;border-radius:14px;text-align:center;padding:8px 3px}.label{font-size:11px;color:#94a3b8}.value{font-size:18px;font-weight:950;margin-top:3px;white-space:nowrap}.ok{color:#86efac}.mid{color:#fde68a}.blue{color:#93c5fd}.side{position:absolute;left:8px;bottom:8px;right:8px;background:rgba(2,6,23,.72);border:1px solid rgba(148,163,184,.25);border-radius:14px;padding:8px;font-size:11px;color:#cbd5e1;max-height:110px;overflow:auto;white-space:pre-wrap}.hidden{display:none!important}@media(max-width:700px){.top{grid-template-columns:1fr}.btns{justify-content:flex-start}.bottom{grid-template-columns:repeat(3,1fr)}.value{font-size:17px}.app{padding:6px;gap:6px}.btn{padding:8px 9px}}
</style></head><body><div class="app"><div class="top"><div><div class="title">AI CAMERA CHAR MEMORY LITE V2</div><div id="memInfo" class="sub">正在加载记忆库...</div></div><div class="btns"><button id="startBtn" class="btn primary">打开摄像头</button><button id="capBtn" class="btn good">拍照识别</button><button id="uploadBtn" class="btn">手动导入</button><button id="stopBtn" class="btn bad">关闭</button><input id="memFile" type="file" accept="application/json" style="display:none"></div></div><div id="stage" class="stage"><video id="video" playsinline webkit-playsinline muted></video><canvas id="canvas" class="hidden"></canvas><div id="roiBox" class="roi"></div><div id="roiText" class="roiText">识别区域</div><div id="log" class="side">请将红框对准黑底白字区域。</div></div><div class="bottom"><div class="card"><div class="label">判断</div><div id="resLang" class="value mid">—</div></div><div class="card"><div class="label">日文分</div><div id="scoreJpn" class="value blue">0</div></div><div class="card"><div class="label">韩文分</div><div id="scoreKor" class="value blue">0</div></div><div class="card"><div class="label">英文分</div><div id="scoreEng" class="value blue">0</div></div><div class="card"><div class="label">有效字符</div><div id="validChars" class="value blue">0</div></div><div class="card"><div class="label">置信度</div><div id="confidence" class="value mid">—</div></div></div></div>
<script>
const $=id=>document.getElementById(id),video=$('video'),canvas=$('canvas'),ctx=canvas.getContext('2d',{willReadFrequently:true});
const S={templates:[],stream:null,roi:{x:.08,y:.13,w:.84,h:.42},params:{white:165,sharp:18,minArea:18,match:.70},camera:false};
function log(m){$('log').textContent=m+'\n'+$('log').textContent.slice(0,1600)}
function info(){let j=S.templates.filter(t=>t.lang==='jpn').length,k=S.templates.filter(t=>t.lang==='kor').length,e=S.templates.filter(t=>t.lang==='eng').length;$('memInfo').textContent=`模板 ${S.templates.length} | JPN ${j} | KOR ${k} | ENG ${e}`}
function bitsFromB64(s){let bin=atob(s),bits=[];for(let i=0;i<bin.length;i++){let b=bin.charCodeAt(i);for(let j=7;j>=0;j--)bits.push((b>>j)&1)}return bits.slice(0,1024)}
function normalizeT(t){if(t.bits_b64)t.bits=bitsFromB64(t.bits_b64); if(!t.row||!t.col){let row=[],col=[];for(let y=0;y<32;y++){let s=0;for(let x=0;x<32;x++)s+=t.bits[y*32+x];row.push(Math.round(s/32*100)/100)}for(let x=0;x<32;x++){let s=0;for(let y=0;y<32;y++)s+=t.bits[y*32+x];col.push(Math.round(s/32*100)/100)}t.row=row;t.col=col}return t}
async function loadMemory(){try{let m=await (await fetch('./memory_manifest.json',{cache:'no-store'})).json();S.roi=m.roi||S.roi;S.params={...S.params,...(m.params||{})};let arr=[];for(let f of (m.parts||[])){let p=await (await fetch(f,{cache:'no-store'})).json();arr=arr.concat(p.templates||[])}S.templates=arr.map(normalizeT);info();updateRoi();log('分片记忆库加载成功');}catch(e){log('自动加载失败，可点“手动导入”选择 memory.json 或 compact part。');$('memInfo').textContent='自动加载失败';}}
function updateRoi(){let st=$('stage').getBoundingClientRect(),tg=S.camera?video.getBoundingClientRect():canvas.getBoundingClientRect();let l=tg.left-st.left+tg.width*S.roi.x,t=tg.top-st.top+tg.height*S.roi.y,w=tg.width*S.roi.w,h=tg.height*S.roi.h;Object.assign($('roiBox').style,{left:l+'px',top:t+'px',width:w+'px',height:h+'px'});Object.assign($('roiText').style,{left:l+8+'px',top:t+8+'px'})}window.onresize=updateRoi;
async function start(){try{S.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});video.srcObject=S.stream;await video.play();S.camera=true;video.classList.remove('hidden');canvas.classList.add('hidden');loop();log('摄像头已打开')}catch(e){alert('摄像头打开失败，请用 iPhone Safari + GitHub Pages HTTPS。\n'+e.message)}}
function stop(){if(S.stream)S.stream.getTracks().forEach(t=>t.stop());S.camera=false;video.classList.add('hidden');log('摄像头已关闭')}function loop(){if(!S.camera)return;updateRoi();requestAnimationFrame(loop)}
function cap(){if(!S.camera){log('请先打开摄像头');return}canvas.width=video.videoWidth;canvas.height=video.videoHeight;ctx.drawImage(video,0,0);video.classList.add('hidden');canvas.classList.remove('hidden');S.camera=false;recog()}
function crop(){let r=S.roi,x=Math.round(canvas.width*r.x),y=Math.round(canvas.height*r.y),w=Math.round(canvas.width*r.w),h=Math.round(canvas.height*r.h);return ctx.getImageData(x,y,w,h)}
function resize(d,maxW=900){let c=document.createElement('canvas'),ratio=Math.min(1,maxW/d.width);c.width=Math.round(d.width*ratio);c.height=Math.round(d.height*ratio);let t=c.getContext('2d',{willReadFrequently:true}),tmp=document.createElement('canvas');tmp.width=d.width;tmp.height=d.height;tmp.getContext('2d').putImageData(d,0,0);t.drawImage(tmp,0,0,c.width,c.height);return t.getImageData(0,0,c.width,c.height)}
function prep(d){d=resize(d);let w=d.width,h=d.height,g=new Uint8ClampedArray(w*h),sum=0;for(let i=0,j=0;i<d.data.length;i+=4,j++){let v=.299*d.data[i]+.587*d.data[i+1]+.114*d.data[i+2];g[j]=v;sum+=v}let th=Math.max(S.params.white,sum/(w*h)+22),bin=new Uint8Array(w*h);for(let i=0;i<g.length;i++)bin[i]=g[i]>=th?1:0;return{w,h,gray:g,bin}}
function sharp(g,w,h,x0,y0,bw,bh){let s=0,n=0;for(let y=Math.max(1,y0);y<Math.min(h-1,y0+bh);y++)for(let x=Math.max(1,x0);x<Math.min(w-1,x0+bw);x++){let i=y*w+x;s+=Math.abs(g[i+1]-g[i-1])+Math.abs(g[i+w]-g[i-w]);n++}return n?s/n:0}
function comps(p){let{w,h,bin,gray}=p,seen=new Uint8Array(w*h),out=[],qx=[],qy=[];for(let yy=0;yy<h;yy++)for(let xx=0;xx<w;xx++){let idx=yy*w+xx;if(!bin[idx]||seen[idx])continue;let minx=xx,maxx=xx,miny=yy,maxy=yy,cnt=0;qx.length=qy.length=0;qx.push(xx);qy.push(yy);seen[idx]=1;for(let qi=0;qi<qx.length;qi++){let x=qx[qi],y=qy[qi];cnt++;minx=Math.min(minx,x);maxx=Math.max(maxx,x);miny=Math.min(miny,y);maxy=Math.max(maxy,y);for(let [nx,ny] of [[x+1,y],[x-1,y],[x,y+1],[x,y-1],[x+1,y+1],[x-1,y-1],[x+1,y-1],[x-1,y+1]]){if(nx<0||ny<0||nx>=w||ny>=h)continue;let ni=ny*w+nx;if(bin[ni]&&!seen[ni]){seen[ni]=1;qx.push(nx);qy.push(ny)}}}let bw=maxx-minx+1,bh=maxy-miny+1,area=cnt,ar=bw/bh,sh=sharp(gray,w,h,minx,miny,bw,bh);if(area<S.params.minArea||bw<3||bh<5||bh>h*.35||bw>w*.35||ar>4.8||ar<.08||sh<S.params.sharp)continue;out.push({x:minx,y:miny,w:bw,h:bh})}return out}
function make(p,c){let pad=3,x=Math.max(0,c.x-pad),y=Math.max(0,c.y-pad),w=Math.min(p.w-x,c.w+pad*2),h=Math.min(p.h-y,c.h+pad*2),bits=[],row=[],col=[],aspect=w/h;for(let yy=0;yy<32;yy++)for(let xx=0;xx<32;xx++){let sx=Math.floor(x+xx/32*w),sy=Math.floor(y+yy/32*h);bits.push(p.bin[sy*p.w+sx])}for(let y=0;y<32;y++){let s=0;for(let x=0;x<32;x++)s+=bits[y*32+x];row.push(Math.round(s/32*100)/100)}for(let x=0;x<32;x++){let s=0;for(let y=0;y<32;y++)s+=bits[y*32+x];col.push(Math.round(s/32*100)/100)}return{aspect,bits,row,col}}
function sim(a,b){let same=0,inter=0,union=0;for(let i=0;i<1024;i++){if(a.bits[i]===b.bits[i])same++;if(a.bits[i]&&b.bits[i])inter++;if(a.bits[i]||b.bits[i])union++}let row=0,col=0;for(let i=0;i<32;i++){row+=1-Math.min(1,Math.abs(a.row[i]-b.row[i]));col+=1-Math.min(1,Math.abs(a.col[i]-b.col[i]))}let ar=1-Math.min(1,Math.abs(a.aspect-b.aspect)/Math.max(a.aspect,b.aspect,.01));return .40*(same/1024)+.30*(union?inter/union:0)+.15*(row/32)+.10*(col/32)+.05*ar}
function draw(p,cs){canvas.width=p.w;canvas.height=p.h;let im=ctx.createImageData(p.w,p.h);for(let i=0;i<p.bin.length;i++){let v=p.bin[i]?255:0;im.data[i*4]=im.data[i*4+1]=im.data[i*4+2]=v;im.data[i*4+3]=255}ctx.putImageData(im,0,0);ctx.strokeStyle='#22c55e';ctx.lineWidth=2;cs.forEach(c=>ctx.strokeRect(c.x,c.y,c.w,c.h));updateRoi()}
function recog(){if(!S.templates.length){log('没有模板');return}let p=prep(crop()),cs=comps(p),qs=cs.map(c=>make(p,c)),scores={jpn:0,kor:0,eng:0},valid=0;for(let q of qs){let best=null,bs=0;for(let t of S.templates){let s=sim(q,t);if(s>bs){bs=s;best=t}}if(best&&bs>=S.params.match){scores[best.lang]=(scores[best.lang]||0)+bs;valid++}}let ranked=Object.entries(scores).sort((a,b)=>b[1]-a[1]),top=ranked[0],sec=ranked[1],conf=top[1]?((top[1]-sec[1])/Math.max(top[1],1)):0,lang='不确定',cls='mid';if(valid>=3&&top[1]>sec[1]*1.35&&conf>.22){lang=top[0]==='jpn'?'日文':top[0]==='kor'?'韩文':'英文';cls='ok'}$('resLang').textContent=lang;$('resLang').className='value '+cls;$('scoreJpn').textContent=scores.jpn.toFixed(2);$('scoreKor').textContent=scores.kor.toFixed(2);$('scoreEng').textContent=scores.eng.toFixed(2);$('validChars').textContent=valid;$('confidence').textContent=(conf*100).toFixed(0)+'%';draw(p,cs);log(`识别=${lang} 有效=${valid} JPN=${scores.jpn.toFixed(2)} KOR=${scores.kor.toFixed(2)} ENG=${scores.eng.toFixed(2)}`)}
$('startBtn').onclick=start;$('stopBtn').onclick=stop;$('capBtn').onclick=cap;$('uploadBtn').onclick=()=>$('memFile').click();$('memFile').onchange=async e=>{let f=e.target.files[0];if(!f)return;let o=JSON.parse(await f.text());if(o.templates)S.templates=o.templates.map(normalizeT);else if(o.parts){} if(o.roi)S.roi=o.roi;if(o.params)S.params={...S.params,...o.params};info();updateRoi();log('手动导入成功')};loadMemory();updateRoi();
</script></body></html>
