<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#0f172a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="AI CAMERA" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<title>AI CAMERA PWA V4 MEMORY LOADER</title>
<style>
:root{--line:#334155;--text:#f8fafc;--muted:#94a3b8;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--yellow:#d97706;--zoom:1}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#020617;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif}.app{height:100svh;max-height:100svh;display:grid;grid-template-rows:.52fr 4.95fr .8fr;padding:calc(4px + env(safe-area-inset-top)) 7px calc(6px + env(safe-area-inset-bottom));gap:5px;background:linear-gradient(180deg,#0f172a,#111827 45%,#020617)}
.top,.mid,.bottom{min-height:0}.top{display:flex;align-items:center;justify-content:center;background:rgba(31,41,55,.62);border:1px solid var(--line);border-radius:15px;padding:4px}.modeBar{width:100%;display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.modeBtn{border:1px solid #475569;border-radius:999px;background:#0b1220;color:#cbd5e1;height:24px;line-height:22px;text-align:center;font-size:12px;font-weight:850}.modeBtn.active{background:#2563eb;border-color:#93c5fd;color:#fff;box-shadow:0 0 0 2px rgba(96,165,250,.2),0 6px 16px rgba(37,99,235,.38)}
.mid{position:relative;border:1px solid var(--line);border-radius:20px;overflow:hidden;background:#020617;display:flex;align-items:center;justify-content:center}.cameraLayer{position:absolute;inset:0;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#020617}.cameraLayer video{width:100%;height:100%;object-fit:cover;transform:scale(var(--zoom));transition:transform .1s ease;will-change:transform}.cameraLayer canvas{display:none}.placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:13px;text-align:center;padding:18px;line-height:1.5}.guide{position:absolute;inset:7% 6%;border:2px dashed rgba(147,197,253,.9);border-radius:18px;pointer-events:none}.focusDot{position:absolute;left:50%;top:50%;width:18px;height:18px;margin-left:-9px;margin-top:-9px;border:2px solid rgba(255,255,255,.78);border-radius:50%;opacity:.75;pointer-events:none}.flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none}.flash.on{animation:flash .18s ease}@keyframes flash{0%{opacity:0}40%{opacity:.55}100%{opacity:0}}
.controls{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);display:flex;gap:10px;align-items:center;background:rgba(15,23,42,.54);border:1px solid rgba(148,163,184,.28);backdrop-filter:blur(10px);padding:6px 8px;border-radius:999px}.iconBtn{width:40px;height:40px;border-radius:50%;border:1px solid rgba(148,163,184,.35);display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(15,23,42,.84);color:#fff}.iconBtn.primary{background:#2563eb;border-color:#93c5fd}.iconBtn.good{background:#16a34a;border-color:#86efac}.iconBtn.off{background:#334155}.iconBtn:disabled{opacity:.42}.zoomBox{position:absolute;right:7px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:7px;background:rgba(15,23,42,.48);border:1px solid rgba(148,163,184,.24);border-radius:999px;padding:5px}.zoomBtn{width:31px;height:31px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;background:rgba(15,23,42,.86);border:1px solid rgba(148,163,184,.35);color:#fff}.zoomVal{font-size:9px;text-align:center;color:#cbd5e1;line-height:1}.busy{position:absolute;left:8px;top:8px;background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.28);border-radius:999px;padding:5px 9px;font-size:11px;color:#dbeafe;display:none}.busy.show{display:block}.spinner{display:inline-block;width:9px;height:9px;border:2px solid rgba(219,234,254,.3);border-top-color:#dbeafe;border-radius:50%;animation:spin .7s linear infinite;margin-right:5px;vertical-align:-1px}@keyframes spin{to{transform:rotate(360deg)}}
.bottom{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}.resCard{min-height:0;background:rgba(31,41,55,.9);border:1px solid var(--line);border-radius:12px;padding:4px 2px;display:flex;flex-direction:column;align-items:center;justify-content:center}.resLabel{font-size:8px;color:#94a3b8;margin-bottom:2px}.resValue{font-size:14px;font-weight:950;line-height:1;white-space:nowrap}.ok{color:#86efac}.ng{color:#fca5a5}.auto{color:#fde68a}.riskLow{color:#86efac}.riskMid{color:#fde68a}.riskHigh{color:#fca5a5}.time{color:#bfdbfe}.hidden{display:none!important}
@media(max-height:680px){.modeBtn{height:22px;line-height:20px;font-size:11px}.iconBtn{width:37px;height:37px;font-size:18px}.resValue{font-size:12px}.resLabel{font-size:7px}.controls{bottom:6px}.zoomBtn{width:29px;height:29px}.top{border-radius:12px}.mid{border-radius:16px}.resCard{border-radius:10px}}
</style>
</head>
<body>
<div class="app">
<section class="top"><div class="modeBar"><div class="modeBtn" data-mode="eng">英文</div><div class="modeBtn" data-mode="jpn">日本</div><div class="modeBtn" data-mode="kor">韩文</div><div class="modeBtn active" data-mode="random">随机</div></div></section>
<section class="mid" id="cameraBox"><div class="cameraLayer"><video id="video" autoplay muted playsinline webkit-playsinline></video><canvas id="canvas"></canvas><canvas id="featureCanvas"></canvas></div><div id="placeholder" class="placeholder">正在加载 memory.json...</div><div class="guide"></div><div class="focusDot"></div><div id="flash" class="flash"></div><div id="busy" class="busy"><span class="spinner"></span>识别中</div><div class="zoomBox"><div id="zoomIn" class="zoomBtn">＋</div><div id="zoomVal" class="zoomVal">1.0x</div><div id="zoomOut" class="zoomBtn">−</div></div><div class="controls"><button id="startBtn" class="iconBtn primary" aria-label="打开摄像头">📷</button><button id="stopBtn" class="iconBtn off" aria-label="关闭摄像头">■</button><button id="captureBtn" class="iconBtn good" aria-label="拍照识别" disabled>◎</button></div></section>
<section class="bottom"><div class="resCard"><div class="resLabel">判断</div><div id="judge" class="resValue auto">—</div></div><div class="resCard"><div class="resLabel">印刷</div><div id="b1Lang" class="resValue auto">—</div></div><div class="resCard"><div class="resLabel">标签</div><div id="b2Lang" class="resValue auto">—</div></div><div class="resCard"><div class="resLabel">空白</div><div id="blank" class="resValue auto">—</div></div><div class="resCard"><div class="resLabel">风险</div><div id="risk" class="resValue auto">—</div></div><div class="resCard"><div class="resLabel">时间</div><div id="recTime" class="resValue time">—</div></div></section>
</div>
<script>
const $=id=>document.getElementById(id);let stream=null,mode='random',zoom=1,recognizing=false,lastTouchDist=0,memory=null,memoryReady=false;const langMap={eng:'英文',jpn:'日本',kor:'韩文',unknown:'未知',none:'无'};
async function loadMemory(){try{const res=await fetch('./memory.json?ts='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error('HTTP '+res.status);memory=await res.json();if(!memory.block1||!memory.block2)throw new Error('memory.json格式不正确');memoryReady=true;const s1=memory.block1.samples?.length||0,s2=memory.block2.samples?.length||0;$('placeholder').innerHTML=`记忆库已加载<br>板块1:${s1} / 板块2:${s2}<br>点击 📷 打开摄像头`;}catch(e){memoryReady=false;$('placeholder').innerHTML='memory.json 加载失败<br>请确认文件已上传到 GitHub 仓库根目录';}}
function setMode(m){mode=m;document.querySelectorAll('.modeBtn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));resetResult()}document.querySelectorAll('.modeBtn').forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.mode)));
function resetResult(){$('judge').textContent='—';$('judge').className='resValue auto';$('b1Lang').textContent='—';$('b1Lang').className='resValue auto';$('b2Lang').textContent='—';$('b2Lang').className='resValue auto';$('blank').textContent='—';$('blank').className='resValue auto';$('risk').textContent='—';$('risk').className='resValue auto';$('recTime').textContent='—'}
function setBusy(on){recognizing=on;$('busy').classList.toggle('show',on);$('captureBtn').disabled=on||!stream||!memoryReady}function updateZoom(){document.documentElement.style.setProperty('--zoom',zoom.toFixed(2));$('zoomVal').textContent=zoom.toFixed(1)+'x'}function changeZoom(d){zoom=Math.max(1,Math.min(3,zoom+d));updateZoom()}$('zoomIn').onclick=()=>changeZoom(.2);$('zoomOut').onclick=()=>changeZoom(-.2);updateZoom();
$('cameraBox').addEventListener('touchstart',e=>{if(e.touches.length===2)lastTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)});$('cameraBox').addEventListener('touchmove',e=>{if(e.touches.length===2){e.preventDefault();const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(lastTouchDist){zoom=Math.max(1,Math.min(3,zoom+(d-lastTouchDist)/260));updateZoom()}lastTouchDist=d}},{passive:false});
async function startCamera(){resetResult();if(!memoryReady){$('placeholder').innerHTML='memory.json 未加载，无法识别';return}$('placeholder').classList.add('hidden');if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){$('placeholder').textContent='浏览器不支持摄像头';$('placeholder').classList.remove('hidden');return}try{stopCamera(false);stream=await navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}});const v=$('video');v.srcObject=stream;v.setAttribute('playsinline','true');v.setAttribute('webkit-playsinline','true');v.muted=true;await v.play();$('captureBtn').disabled=false;$('placeholder').classList.add('hidden')}catch(e){$('placeholder').textContent='摄像头打开失败';$('placeholder').classList.remove('hidden')}}
function stopCamera(show=true){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}$('captureBtn').disabled=true;if(show){$('placeholder').textContent=memoryReady?'点击 📷 打开摄像头':'memory.json 未加载';$('placeholder').classList.remove('hidden')}}$('startBtn').onclick=startCamera;$('stopBtn').onclick=()=>stopCamera(true);$('captureBtn').onclick=captureAndRecognize;
function captureCanvas(){const v=$('video'),c=$('canvas'),ctx=c.getContext('2d',{willReadFrequently:true});const vw=v.videoWidth||1280,vh=v.videoHeight||720;const scale=zoom;const sw=vw/scale,sh=vh/scale,sx=(vw-sw)/2,sy=(vh-sh)/2;c.width=420;c.height=Math.round(420*sh/sw);ctx.drawImage(v,sx,sy,sw,sh,0,0,c.width,c.height);return c}
function findDarkBBox(imgData,w,h){const d=imgData.data;let xs=[],ys=[];for(let y=0;y<h;y+=2){for(let x=0;x<w;x+=2){const i=(y*w+x)*4,g=.299*d[i]+.587*d[i+1]+.114*d[i+2];if(g<125){xs.push(x);ys.push(y)}}}if(xs.length<80)return {x:0,y:0,w,h};xs.sort((a,b)=>a-b);ys.sort((a,b)=>a-b);let x1=xs[Math.floor(xs.length*.01)],x2=xs[Math.floor(xs.length*.99)],y1=ys[Math.floor(ys.length*.01)],y2=ys[Math.floor(ys.length*.99)];let px=(x2-x1)*.025,py=(y2-y1)*.025;const nx=Math.max(0,x1-px),ny=Math.max(0,y1-py),rx=Math.min(w,x2+px),ry=Math.min(h,y2+py);return {x:nx,y:ny,w:rx-nx,h:ry-ny}}
function detectWhiteLabelBBox(canvas,pkg){const ctx=canvas.getContext('2d',{willReadFrequently:true}),w=canvas.width,h=canvas.height,d=ctx.getImageData(0,0,w,h).data;const x0=Math.max(0,Math.floor(pkg.x+pkg.w*.06)),x1=Math.min(w,Math.floor(pkg.x+pkg.w*.94));const y0=Math.max(0,Math.floor(pkg.y+pkg.h*.28)),y1=Math.min(h,Math.floor(pkg.y+pkg.h*.78));let xs=[],ys=[];for(let y=y0;y<y1;y+=2){for(let x=x0;x<x1;x+=2){const i=(y*w+x)*4,r=d[i],g=d[i+1],b=d[i+2],gray=.299*r+.587*g+.114*b;if(gray>165&&Math.abs(r-g)<38&&Math.abs(g-b)<38){xs.push(x);ys.push(y)}}}if(xs.length<80)return null;xs.sort((a,b)=>a-b);ys.sort((a,b)=>a-b);let bx0=xs[Math.floor(xs.length*.03)],bx1=xs[Math.floor(xs.length*.97)],by0=ys[Math.floor(ys.length*.03)],by1=ys[Math.floor(ys.length*.97)];if((bx1-bx0)<pkg.w*.12||(by1-by0)<pkg.h*.035)return null;return {x:bx0,y:by0,w:bx1-bx0,h:by1-by0}}
function cropToFeatureCanvas(src,roi,outW,outH){const fc=$('featureCanvas'),ctx=fc.getContext('2d',{willReadFrequently:true});fc.width=outW;fc.height=outH;ctx.fillStyle='#fff';ctx.fillRect(0,0,outW,outH);ctx.drawImage(src,roi.x,roi.y,roi.w,roi.h,0,0,outW,outH);return fc}
function featureFromCanvas(c,mode='darkText'){const ctx=c.getContext('2d',{willReadFrequently:true}),w=c.width,h=c.height,d=ctx.getImageData(0,0,w,h).data;let gray=[];for(let i=0;i<d.length;i+=4)gray.push((.299*d[i]+.587*d[i+1]+.114*d[i+2])/255);const cellsX=16,cellsY=16,vec=[];for(let cy=0;cy<cellsY;cy++)for(let cx=0;cx<cellsX;cx++){let sum=0,ink=0,count=0;for(let yy=Math.floor(cy*h/cellsY);yy<Math.floor((cy+1)*h/cellsY);yy++)for(let xx=Math.floor(cx*w/cellsX);xx<Math.floor((cx+1)*w/cellsX);xx++){const g=gray[yy*w+xx];sum+=g;if(mode==='whiteText'){if(g>.62)ink++}else{if(g<.45)ink++}count++}vec.push(Math.round((sum/count)*255));vec.push(Math.round((ink/count)*255))}return vec}
function blankAnalysis(c){const ctx=c.getContext('2d',{willReadFrequently:true}),w=c.width,h=c.height,d=ctx.getImageData(0,0,w,h).data;let ink=0,white=0,total=w*h,map=[];for(let y=0;y<h;y++){let row=[];for(let x=0;x<w;x++){const i=(y*w+x)*4,g=.299*d[i]+.587*d[i+1]+.114*d[i+2],isInk=g<95,isWhite=g>170;if(isInk)ink++;if(isWhite)white++;row.push(isInk?1:0)}map.push(row)}let maxBlankRow=0,cur=0;for(let y=0;y<h;y++){const rowInk=map[y].reduce((a,b)=>a+b,0)/w;if(rowInk<.01)cur++;else{maxBlankRow=Math.max(maxBlankRow,cur);cur=0}}maxBlankRow=Math.max(maxBlankRow,cur);let maxBlankCol=0;cur=0;for(let x=0;x<w;x++){let s=0;for(let y=0;y<h;y++)s+=map[y][x];const colInk=s/h;if(colInk<.01)cur++;else{maxBlankCol=Math.max(maxBlankCol,cur);cur=0}}maxBlankCol=Math.max(maxBlankCol,cur);const inkRatio=ink/total,whiteRatio=white/total,blankBandRatio=Math.max(maxBlankRow/h,maxBlankCol/w);const rules=memory.blankRules||{inkMin:.018,whiteRunThreshold:.42};return {inkRatio,whiteRatio,blankBandRatio,abnormal:inkRatio<rules.inkMin||blankBandRatio>rules.whiteRunThreshold}}
function dist(a,b){let s=0,n=Math.min(a.length,b.length);for(let i=0;i<n;i++){const d=a[i]-b[i];s+=d*d}return Math.sqrt(s/n)/255}
function knn(feature,samples,k=5){if(!samples||!samples.length)return {lang:'unknown',risk:99,top:[],best:0,margin:0};const top=samples.map(s=>({lang:s.lang,score:1-dist(feature,s.feature)})).sort((a,b)=>b.score-a.score).slice(0,k);const scoreBy={};top.forEach((t,idx)=>scoreBy[t.lang]=(scoreBy[t.lang]||0)+t.score*(k-idx));const ranked=Object.entries(scoreBy).sort((a,b)=>b[1]-a[1]);const lang=ranked[0][0],second=ranked[1]?ranked[1][1]:0,margin=(ranked[0][1]-second)/Math.max(1,ranked[0][1]),best=top[0].score;let risk=Math.round(Math.max(0,Math.min(99,(1-best)*145+Math.max(0,.35-margin)*120)));return {lang,risk,top,best,margin}}
function render(final,b1,b2,labelPresent,blank,elapsed){$('judge').textContent=final.judge;$('judge').className='resValue '+final.cls;$('b1Lang').textContent=langMap[b1.lang]||'未知';$('b1Lang').className='resValue '+(b1.risk<70?'ok':'ng');$('b2Lang').textContent=labelPresent?(langMap[b2.lang]||'未知'):'无';$('b2Lang').className='resValue '+(!labelPresent?'auto':b2.risk<70?'ok':'ng');$('blank').textContent=labelPresent?(blank.abnormal?'NG':'OK'):'无';$('blank').className='resValue '+(!labelPresent?'auto':blank.abnormal?'ng':'ok');$('risk').textContent=final.risk+'%';$('risk').className='resValue '+(final.risk<30?'riskLow':final.risk<70?'riskMid':'riskHigh');$('recTime').textContent=(elapsed/1000).toFixed(2)+'s'}
async function captureAndRecognize(){if(!stream||recognizing||!memoryReady)return;const t0=performance.now();setBusy(true);$('flash').classList.add('on');setTimeout(()=>$('flash').classList.remove('on'),190);try{const canvas=captureCanvas(),ctx=canvas.getContext('2d',{willReadFrequently:true}),pkg=findDarkBBox(ctx.getImageData(0,0,canvas.width,canvas.height),canvas.width,canvas.height);const label=detectWhiteLabelBBox(canvas,pkg);const r1={x:pkg.x+pkg.w*.05,y:pkg.y+pkg.h*.09,w:pkg.w*.90,h:pkg.h*.24};const r2=label||{x:pkg.x+pkg.w*.23,y:pkg.y+pkg.h*.43,w:pkg.w*.54,h:pkg.h*.12};const f1=featureFromCanvas(cropToFeatureCanvas(canvas,r1,96,64),'whiteText');const b1=knn(f1,memory.block1.samples,5);let labelPresent=!!label,b2={lang:'none',risk:0},blank={abnormal:false,inkRatio:0,whiteRatio:0};if(labelPresent){const labelCanvas=cropToFeatureCanvas(canvas,r2,96,48);const f2=featureFromCanvas(labelCanvas,'darkText');blank=blankAnalysis(labelCanvas);b2=knn(f2,memory.block2.samples,5)}let risk=Math.max(b1.risk,labelPresent?b2.risk:0);let judge='AUTO',cls='auto';if(mode!=='random'){if(b1.lang!==mode)risk=Math.max(risk,92);if(labelPresent&&b2.lang!==mode)risk=Math.max(risk,92);if(labelPresent&&blank.abnormal)risk=Math.max(risk,95);if(b1.lang===mode&&(!labelPresent||b2.lang===mode)&&(!labelPresent||!blank.abnormal)&&risk<80){judge='OK';cls='ok'}else{judge='NG';cls='ng'}}else{if(labelPresent&&blank.abnormal)risk=Math.max(risk,95)}render({judge,cls,risk},b1,b2,labelPresent,blank,performance.now()-t0)}catch(e){$('judge').textContent='NG';$('judge').className='resValue ng';$('risk').textContent='99%';$('risk').className='resValue riskHigh';$('recTime').textContent=((performance.now()-t0)/1000).toFixed(2)+'s'}finally{setBusy(false)}}
if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}))}window.addEventListener('pagehide',()=>stopCamera(false));loadMemory();
</script>
</body>
</html>
