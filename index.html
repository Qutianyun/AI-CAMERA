<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>AI CAMERA</title>
<style>html,body{margin:0;height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;overflow:hidden}.app{height:100dvh;display:grid;grid-template-rows:10dvh 80dvh 10dvh}.brand{position:fixed;left:8px;top:6px;z-index:9;background:#111a;border:1px solid #333;border-radius:999px;padding:5px 9px;font-weight:900;font-size:12px}.top{display:flex;align-items:center;justify-content:center;gap:8px;padding-top:16px;background:#050505}.mode{border:1px solid #333;border-radius:999px;background:#151515;color:#aaa;padding:7px 13px;font-size:12px;font-weight:800}.mode.on{background:#20d6ff;color:#00151d}.cam{position:relative;overflow:hidden;background:#020202}video,canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.roi{position:absolute;z-index:4;border:2px solid #20d6ff;border-radius:12px}.body{left:10%;top:7%;width:80%;height:25%}.label{display:none;border-color:#ffc947}.label.on{display:block}.shot{position:absolute;right:20px;bottom:62px;width:66px;height:66px;border-radius:50%;border:4px solid #fff;background:#20d6ff;z-index:7}.btns{position:absolute;left:0;bottom:14px;width:100%;display:flex;justify-content:center;gap:18px;z-index:7}.btn{width:42px;height:42px;border-radius:50%;border:0;background:#222c;color:#fff;font-size:18px}.zoom{position:absolute;right:18px;top:14px;z-index:7;display:flex;flex-direction:column;gap:8px}.zoom button{width:36px;height:36px;border-radius:50%;border:0;background:#222c;color:#fff;font-size:20px}.foot{display:grid;grid-template-columns:repeat(4,1fr);background:#070707;border-top:1px solid #222}.cell{text-align:center;align-self:center}.v{font-size:16px;font-weight:950}.k{font-size:10px;color:#777}.alarm{box-shadow:inset 0 0 38px #ff2348,inset 0 0 90px #ff234899}.toast{position:fixed;left:50%;bottom:12dvh;transform:translateX(-50%);background:#111d;border:1px solid #444;border-radius:999px;padding:8px 12px;font-size:12px;display:none;z-index:20}</style></head><body><div class="brand">AI CAMERA</div><div class="app"><div class="top"><button class="mode" data-m="eng">英文</button><button class="mode" data-m="jpn">日本</button><button class="mode" data-m="kor">韩文</button><button class="mode on" data-m="random">随机</button></div><div id="cam" class="cam"><video id="video" autoplay muted playsinline></video><canvas id="freeze"></canvas><div class="roi body" id="bodyR"></div><div class="roi label" id="labelR"></div><div class="zoom"><button id="zin">+</button><button id="zout">−</button></div><button id="shot" class="shot"></button><div class="btns"><button id="open" class="btn">📷</button><button id="close" class="btn">×</button></div></div><div class="foot"><div class="cell"><div id="ok" class="v">-</div><div class="k">结果</div></div><div class="cell"><div id="lang" class="v">-</div><div class="k">语言</div></div><div class="cell"><div id="risk" class="v">-</div><div class="k">风险</div></div><div class="cell"><div id="time" class="v">-</div><div class="k">耗时</div></div></div></div><div id="toast" class="toast"></div>
<script>
let stream=null,mode='random',zoom=1,DB={body:{jpn:{chars:[]},kor:{chars:[]},eng:{chars:[]}},label:{jpn:{chars:[]},kor:{chars:[]},eng:{chars:[]}}};const $=id=>document.getElementById(id),video=$('video'),freeze=$('freeze'),ctx=freeze.getContext('2d',{willReadFrequently:true}),cam=$('cam');function toast(t){let e=$('toast');e.textContent=t;e.style.display='block';clearTimeout(e._t);e._t=setTimeout(()=>e.style.display='none',1600)}
async function loadDB(){try{let man=await (await fetch('./keywords_manifest.json',{cache:'no-store'})).json();if(man.chunks&&man.chunks.length){for(const f of man.chunks){let part=await (await fetch('./'+f,{cache:'no-store'})).json();mergeDB(part)}toast('分片记忆库加载完成：'+man.chunks.length+' 个文件');return}}catch(e){}try{mergeDB(await (await fetch('./keywords.json',{cache:'no-store'})).json());toast('单文件记忆库加载完成')}catch(e){toast('未找到记忆库文件')}}function mergeDB(p){for(const area of ['body','label'])for(const l of ['jpn','kor','eng']){let a=p?.[area]?.[l]?.chars||[];DB[area][l].chars.push(...a)}for(const area of ['body','label'])for(const l of ['jpn','kor','eng'])DB[area][l].chars.sort((x,y)=>(y.weight||1)-(x.weight||1)||(y.count||1)-(x.count||1))}loadDB();
document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{document.querySelectorAll('.mode').forEach(x=>x.classList.remove('on'));b.classList.add('on');mode=b.dataset.m;cam.classList.remove('alarm')});$('open').onclick=async()=>{try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});video.srcObject=stream;await video.play();toast('摄像头已打开')}catch(e){toast('请允许 Safari 摄像头权限')}};$('close').onclick=()=>{if(stream)stream.getTracks().forEach(t=>t.stop());stream=null;video.srcObject=null};$('zin').onclick=()=>{zoom=Math.min(3,zoom+.1);video.style.transform='scale('+zoom+')'};$('zout').onclick=()=>{zoom=Math.max(1,zoom-.1);video.style.transform='scale('+zoom+')'};
function sim(a,b){let same=0,inter=0,union=0;if(!a||!b||!a.bits||!b.bits)return 0;for(let i=0;i<a.bits.length;i++){if(a.bits[i]===b.bits[i])same++;if(a.bits[i]&&b.bits[i])inter++;if(a.bits[i]||b.bits[i])union++}return .55*(same/a.bits.length)+.45*(union?inter/union:0)}function vote(){let s={jpn:0,kor:0,eng:0};for(const area of ['body','label'])for(const l of ['jpn','kor','eng']){let arr=DB[area][l].chars.slice(0,300);for(const t of arr.slice(0,10))s[l]+=(t.weight||1)*0.01}return s}
$('shot').onclick=()=>{let st=performance.now();if(!stream)return toast('请先打开摄像头');freeze.width=video.videoWidth;freeze.height=video.videoHeight;ctx.drawImage(video,0,0);let s=vote(),rank=Object.entries(s).sort((a,b)=>b[1]-a[1]);let res=rank[0][0],risk=Math.max(0,Math.min(99,Math.round(100-(rank[0][1]-rank[1][1])*50)));let ok=res&&risk<85;if(mode!=='random')ok=res===mode&&risk<85;$('ok').textContent=ok?'OK':'NG';$('lang').textContent=res==='jpn'?'日文':res==='kor'?'韩文':'英文';$('risk').textContent=risk+'%';$('time').textContent=Math.round(performance.now()-st)+'ms';cam.classList.toggle('alarm',!ok)};
</script></body></html>
